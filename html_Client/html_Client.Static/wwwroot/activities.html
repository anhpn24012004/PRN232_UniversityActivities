<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>University Activities - Activities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="index.html"><img class="brand-logo" src="images/ua-logo.png" alt="University Activities logo"><span>University Activities</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="activities.html">Activities</a></li>
                    <li class="nav-item auth-required d-none"><a class="nav-link" href="my-registrations.html">My Registrations</a></li>
                    <li class="nav-item auth-required d-none"><a class="nav-link" href="profile.html">Profile</a></li>
                </ul>
                <span class="auth-summary me-3" id="authStatus">Guest</span>
                <a class="btn btn-outline-primary btn-sm me-2 guest-only" href="login.html">Login</a>
                <a class="btn btn-primary btn-sm guest-only" href="register.html">Register</a>
                <button class="btn btn-outline-danger btn-sm auth-required d-none" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container page-shell">
        <div id="message" class="message-area"></div>
        <section class="content-panel mb-4">
            <h1 class="h4 mb-4">Approved Activities</h1>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label" for="keyword">Keyword</label>
                    <input class="form-control" id="keyword" placeholder="Activity name">
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="type">Activity Type</label>
                    <select class="form-select" id="type">
                        <option value="">All types</option>
                        <option value="1">Workshop</option>
                        <option value="2">Seminar</option>
                        <option value="3">Competition</option>
                        <option value="4">Volunteer</option>
                        <option value="5">ClubEvent</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="location">Location</label>
                    <input class="form-control" id="location" placeholder="Location">
                </div>
                <div class="col-md-2 d-flex align-items-end gap-2">
                    <button class="btn btn-primary w-100" id="searchBtn">Search</button>
                    <button class="btn btn-outline-secondary w-100" id="resetBtn">Reset</button>
                </div>
            </div>
        </section>

        <section class="content-panel">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Type</th>
                            <th>Location</th>
                            <th>Start</th>
                            <th>End</th>
                            <th>Max</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="activitiesBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/activities.js"></script>
</body>
</html>
