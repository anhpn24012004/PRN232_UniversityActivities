<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>University Activities - Activity Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="index.html"><img class="brand-logo" src="images/ua-logo.png" alt="University Activities logo"><span>University Activities</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="activities.html">Activities</a></li>
                    <li class="nav-item auth-required d-none"><a class="nav-link" href="my-registrations.html">My Registrations</a></li>
                    <li class="nav-item auth-required d-none"><a class="nav-link" href="profile.html">Profile</a></li>
                </ul>
                <span class="auth-summary me-3" id="authStatus">Guest</span>
                <a class="btn btn-outline-primary btn-sm me-2 guest-only" href="login.html">Login</a>
                <a class="btn btn-primary btn-sm guest-only" href="register.html">Register</a>
                <button class="btn btn-outline-danger btn-sm auth-required d-none" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container page-shell">
        <div id="message" class="message-area"></div>
        <div class="mb-3">
            <a class="btn btn-outline-secondary" href="activities.html">&larr; Back to Activities</a>
        </div>
        <section class="content-panel" id="activityDetail">
            <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                <div>
                    <h1 class="h3 mb-2" id="activityTitle">Activity Detail</h1>
                    <div class="text-muted" id="activityOrganizer"></div>
                </div>
                <span class="status-pill" id="activityStatus"></span>
            </div>
            <p class="activity-description" id="activityDescription"></p>
            <div class="row g-3 my-3">
                <div class="col-md-4"><strong>Type:</strong> <span id="activityType"></span></div>
                <div class="col-md-4"><strong>Location:</strong> <span id="activityLocation"></span></div>
                <div class="col-md-4"><strong>Max:</strong> <span id="activityMax"></span></div>
                <div class="col-md-6"><strong>Start:</strong> <span id="activityStart"></span></div>
                <div class="col-md-6"><strong>End:</strong> <span id="activityEnd"></span></div>
            </div>
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-primary" id="registerBtn">Register Activity</button>
                <span class="text-muted" id="registerHint"></span>
            </div>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/activities.js"></script>
</body>
</html>
