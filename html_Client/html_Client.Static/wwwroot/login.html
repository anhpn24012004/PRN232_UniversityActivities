<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>University Activities - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="index.html"><img class="brand-logo" src="images/ua-logo.png" alt="University Activities logo"><span>University Activities</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="activities.html">Activities</a></li>
                    <li class="nav-item auth-required d-none"><a class="nav-link" href="my-registrations.html">My Registrations</a></li>
                    <li class="nav-item auth-required d-none"><a class="nav-link" href="profile.html">Profile</a></li>
                </ul>
                <span class="auth-summary me-3" id="authStatus">Guest</span>
                <a class="btn btn-outline-primary btn-sm me-2 guest-only active" href="login.html">Login</a>
                <a class="btn btn-primary btn-sm guest-only" href="register.html">Register</a>
                <button class="btn btn-outline-danger btn-sm auth-required d-none" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container page-shell">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div id="message" class="message-area"></div>
                <section class="content-panel">
                    <h1 class="h4 mb-4">Login</h1>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" id="email" type="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" id="password" type="password" required>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Login</button>
                    </form>
                </section>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
